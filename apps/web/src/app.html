<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F3F6F3" data-light="#F3F6F3" data-dark="#111816" />
    <link rel="icon" href="/favicon.svg" />
    <script>
      (() => {
        let stored = null;
        try {
          const value = localStorage.getItem('kifu-theme');
          if (value === 'light' || value === 'dark') stored = value;
        } catch {}

        const theme = stored ?? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        const root = document.documentElement;
        root.dataset.theme = theme;
        root.dataset.themeSource = stored ? 'user' : 'system';
        root.style.colorScheme = theme;

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.content = themeColor.dataset[theme];
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
